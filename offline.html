<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Çevrimdışı · Ev Muhasebe</title>
<style>
    :root{ --forest:#14452F; --cream:#F6F4EE; --ink:#1A1D23; --muted:#6B7280; }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
         background:var(--cream);color:var(--ink);font-family:'Segoe UI',system-ui,Arial,sans-serif;padding:24px}
    .box{max-width:420px;text-align:center;background:#fff;border:1px solid #E5E0D5;border-radius:18px;
         padding:34px 28px;box-shadow:0 12px 34px rgba(0,0,0,.07)}
    .logo{width:74px;height:74px;border-radius:18px;background:var(--forest);color:var(--cream);
          display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;margin:0 auto 16px}
    h1{font-size:20px;margin:0 0 8px}
    p{color:var(--muted);line-height:1.55;margin:0 0 20px}
    button{background:var(--forest);color:#fff;border:0;padding:11px 20px;border-radius:10px;
           font-size:14px;cursor:pointer}
    .hint{font-size:12.5px;color:var(--muted);margin-top:16px}
</style>
</head>
<body>
    <div class="box">
        <div class="logo">₺</div>
        <h1>İnternet bağlantısı yok</h1>
        <p>Şu anda çevrimdışısınız. Daha önce açtığınız sayfalar görüntülenebilir; yeni veriler için bağlantı gerekir.</p>
        <button onclick="location.reload()">Yeniden Dene</button>
        <div class="hint">Ev Muhasebe · çevrimdışı mod</div>
    </div>
</body>
</html>
